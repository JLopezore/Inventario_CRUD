<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD Lab – Videojuegos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent-light: #a855f7;
      --success: #10b981;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #2d2d4e;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header .logo {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent-light), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
      display: grid;
      gap: 2rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text);
    }
    .card-title .icon { font-size: 1.2rem; }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="text"],
    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent-light);
    }

    .checkbox-label {
      flex-direction: row;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.95rem;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text);
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: var(--accent-light);
      cursor: pointer;
    }

    .form-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 0.75rem; }

    button {
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: #fff;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    button:hover { opacity: 0.88; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .stat {
      flex: 1;
      min-width: 130px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .stat .value {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--accent-light);
    }
    .stat .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #1e1e38;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(124,58,237,0.06); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge.done    { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge.pending { background: rgba(148,163,184,0.12); color: #94a3b8; }

    .game-title { font-weight: 700; color: var(--text); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty .emoji { font-size: 3rem; margin-bottom: 0.75rem; display: block; }

    /* ── Loader ── */
    .loader {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 1.1rem;
      height: 1.1rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">🎮 CRUD Lab</div>
    <div class="subtitle">Gestión de Videojuegos · Spring Boot API</div>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat"><div class="value" id="stat-total">—</div><div class="label">Total juegos</div></div>
    <div class="stat"><div class="value" id="stat-done">—</div><div class="label">Completados</div></div>
    <div class="stat"><div class="value" id="stat-pending">—</div><div class="label">Pendientes</div></div>
  </div>

  <!-- Form -->
  <div class="card">
    <h2 class="card-title"><span class="icon">➕</span> Agregar Videojuego</h2>
    <form id="form" onsubmit="handleSubmit(event)">
      <div class="form-grid">
        <label>
          Título *
          <input type="text" id="titulo" placeholder="Ej: The Legend of Zelda" required />
        </label>
        <label>
          Plataforma
          <input type="text" id="plataforma" placeholder="Ej: Nintendo Switch" />
        </label>
        <label>
          Año de lanzamiento
          <input type="number" id="anioLanzamiento" placeholder="Ej: 2023" min="1970" max="2030" />
        </label>
        <label class="checkbox-label" style="justify-content: flex-start; align-self: flex-end; padding-bottom: 0.6rem;">
          <input type="checkbox" id="completado" />
          Marcado como completado
        </label>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="resetForm()">Limpiar</button>
          <button type="submit" class="btn-primary" id="btn-submit">Guardar</button>
        </div>
      </div>
    </form>
  </div>

  <!-- List -->
  <div class="card">
    <h2 class="card-title">
      <span class="icon">🗂️</span> Catálogo
      <button class="btn-secondary" style="margin-left:auto; padding:0.35rem 0.9rem; font-size:0.8rem;" onclick="loadGames()">↻ Refrescar</button>
    </h2>
    <div class="table-wrap">
      <div id="list-container"><div class="loader"><span class="spinner"></span>Cargando…</div></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8080/api/videojuego';

  async function loadGames() {
    const container = document.getElementById('list-container');
    container.innerHTML = '<div class="loader"><span class="spinner"></span>Cargando…</div>';

    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const games = await res.json();
      renderGames(games);
      renderStats(games);
    } catch (e) {
      container.innerHTML = `<div class="empty"><span class="emoji">⚠️</span>No se pudo conectar con la API.<br><small>${e.message}</small></div>`;
    }
  }

  function renderGames(games) {
    const container = document.getElementById('list-container');
    if (!games.length) {
      container.innerHTML = '<div class="empty"><span class="emoji">🕹️</span>No hay videojuegos registrados aún.<br>¡Agrega el primero!</div>';
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Plataforma</th>
            <th>Año</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          ${games.map(g => `
            <tr>
              <td style="color:var(--text-muted); width:50px">${g.id}</td>
              <td class="game-title">${esc(g.titulo)}</td>
              <td>${esc(g.plataforma || '—')}</td>
              <td>${g.anioLanzamiento ?? '—'}</td>
              <td>
                ${g.completado
                  ? '<span class="badge done">✔ Completado</span>'
                  : '<span class="badge pending">⏳ Pendiente</span>'}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function renderStats(games) {
    const done = games.filter(g => g.completado).length;
    document.getElementById('stat-total').textContent   = games.length;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-pending').textContent = games.length - done;
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Guardando…';

    const body = {
      titulo:          document.getElementById('titulo').value.trim(),
      plataforma:      document.getElementById('plataforma').value.trim() || null,
      anioLanzamiento: parseInt(document.getElementById('anioLanzamiento').value) || null,
      completado:      document.getElementById('completado').checked,
    };

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast('Videojuego guardado ✔', 'success');
      resetForm();
      loadGames();
    } catch (e) {
      showToast('Error al guardar: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Guardar';
    }
  }

  function resetForm() {
    document.getElementById('form').reset();
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 3000);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  loadGames();
</script>
</body>
</html>
