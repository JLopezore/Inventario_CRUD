<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD Lab – Videojuegos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent-light: #a855f7;
      --success: #10b981;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #2d2d4e;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header .logo {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent-light), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .subtitle { font-size: 0.85rem; color: var(--text-muted); }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
      display: grid;
      gap: 2rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text);
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent-light); }

    .checkbox-label {
      flex-direction: row;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.95rem;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text);
      cursor: pointer;
    }
    input[type="checkbox"] { width: 1.1rem; height: 1.1rem; accent-color: var(--accent-light); cursor: pointer; }

    .form-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 0.75rem; }

    button {
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    button:hover { opacity: 0.88; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 2000;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }

    /* ── Stats ── */
    .stats { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat {
      flex: 1;
      min-width: 130px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .stat .value { font-size: 1.75rem; font-weight: 800; color: var(--accent-light); }
    .stat .label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 0.85rem 1rem; border-bottom: 1px solid #1e1e38; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr { cursor: pointer; transition: background 0.15s; }
    tbody tr:hover td { background: rgba(124,58,237,0.1); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge.done    { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge.pending { background: rgba(148,163,184,0.12); color: #94a3b8; }
    .game-title { font-weight: 700; color: var(--text); }

    /* ── Empty / Loader ── */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty .emoji { font-size: 3rem; margin-bottom: 0.75rem; display: block; }
    .loader { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 1.1rem; height: 1.1rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    /* ── Modal overlay ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #modal-overlay.open { opacity: 1; pointer-events: all; }

    /* ── Modal panel ── */
    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 820px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s;
      position: relative;
    }
    #modal-overlay.open #modal { transform: translateY(0) scale(1); }

    #modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      width: 2rem;
      height: 2rem;
      padding: 0;
      font-size: 1.1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #modal-close:hover { color: var(--text); }

    /* ── Modal hero (imagen + datos básicos) ── */
    .modal-hero {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
    }
    @media (max-width: 600px) { .modal-hero { grid-template-columns: 1fr; } }

    .modal-cover {
      border-radius: 16px 0 0 0;
      overflow: hidden;
      min-height: 280px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 600px) { .modal-cover { border-radius: 16px 16px 0 0; min-height: 220px; } }

    .modal-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal-cover .no-image {
      font-size: 5rem;
      opacity: 0.3;
      user-select: none;
    }

    .modal-info {
      padding: 2rem 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-game-title {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
      padding-right: 2.5rem;
    }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .meta-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.3rem 0.75rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .meta-chip strong { color: var(--text); }

    /* ── Modal Wikipedia description ── */
    .modal-body {
      padding: 0 2rem 2rem;
      border-top: 1px solid var(--border);
    }
    .wiki-section { padding-top: 1.5rem; }
    .wiki-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .wiki-text {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #cbd5e1;
    }
    .wiki-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.85rem;
      font-size: 0.82rem;
      color: var(--accent-light);
      text-decoration: none;
      font-weight: 600;
    }
    .wiki-link:hover { text-decoration: underline; }
    .wiki-loading { color: var(--text-muted); font-size: 0.9rem; padding: 1rem 0; }
    .wiki-not-found { color: var(--text-muted); font-size: 0.88rem; font-style: italic; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 2rem 0.55rem 2.2rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent-light); }
    .search-icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 0.85rem;
    }
    .search-clear {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.1rem 0.3rem;
      font-size: 0.85rem;
      display: none;
      border-radius: 4px;
    }
    .search-clear.visible { display: block; }
    .search-clear:hover { color: var(--text); }
    select.sort-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select.sort-select:focus { border-color: var(--accent-light); }
    .result-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Modal action buttons ── */
    .modal-actions {
      margin-top: auto;
      display: flex;
      gap: 0.6rem;
      padding-top: 0.5rem;
    }
    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); opacity: 1; }

    /* ── Edit form ── */
    .edit-section { padding-top: 1.5rem; }
    .edit-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .edit-grid { grid-template-columns: 1fr; } }
    .edit-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      padding-top: 0.5rem;
    }

    /* ── Delete confirm ── */
    .delete-section {
      padding-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .delete-warning {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      color: #fca5a5;
    }
    .delete-warning strong { color: #f87171; display: block; margin-bottom: 0.3rem; }
    .delete-confirm-actions { display: flex; justify-content: flex-end; gap: 0.6rem; }
    .btn-confirm-delete { background: var(--danger); color: #fff; border: none; }
    .btn-confirm-delete:hover { opacity: 0.88; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">🎮 CRUD Lab</div>
    <div class="subtitle">Gestión de Videojuegos · Spring Boot API</div>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat"><div class="value" id="stat-total">—</div><div class="label">Total juegos</div></div>
    <div class="stat"><div class="value" id="stat-done">—</div><div class="label">Completados</div></div>
    <div class="stat"><div class="value" id="stat-pending">—</div><div class="label">Pendientes</div></div>
  </div>

  <!-- Form -->
  <div class="card">
    <h2 class="card-title"><span>➕</span> Agregar Videojuego</h2>
    <form id="form" onsubmit="handleSubmit(event)">
      <div class="form-grid">
        <label>
          Título *
          <input type="text" id="titulo" placeholder="Ej: The Legend of Zelda" required />
        </label>
        <label>
          Plataforma
          <input type="text" id="plataforma" placeholder="Ej: Nintendo Switch" />
        </label>
        <label>
          Año de lanzamiento
          <input type="number" id="anioLanzamiento" placeholder="Ej: 2023" min="1970" max="2030" />
        </label>
        <label class="checkbox-label" style="justify-content: flex-start; align-self: flex-end; padding-bottom: 0.6rem;">
          <input type="checkbox" id="completado" />
          Marcado como completado
        </label>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="resetForm()">Limpiar</button>
          <button type="submit" class="btn-primary" id="btn-submit">Guardar</button>
        </div>
      </div>
    </form>
  </div>

  <!-- List -->
  <div class="card">
    <h2 class="card-title">
      <span>🗂️</span> Catálogo
      <small style="color:var(--text-muted); font-weight:400; font-size:0.8rem; margin-left:0.25rem;">— pulsa una fila para ver detalles</small>
      <button class="btn-secondary" style="margin-left:auto; padding:0.35rem 0.9rem; font-size:0.8rem;" onclick="loadGames()">↻ Refrescar</button>
    </h2>
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text"
               placeholder="Buscar por título o plataforma…"
               oninput="applyFilters()" />
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <select class="sort-select" id="sort-select" onchange="applyFilters()">
        <option value="titulo-asc">Título A → Z</option>
        <option value="titulo-desc">Título Z → A</option>
        <option value="anio-desc">Año: más reciente</option>
        <option value="anio-asc">Año: más antiguo</option>
        <option value="id-asc">Orden de registro</option>
      </select>
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="table-wrap">
      <div id="list-container"><div class="loader"><span class="spinner"></span>Cargando…</div></div>
    </div>
  </div>

</main>

<!-- Detail modal -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal" role="dialog" aria-modal="true">
    <button id="modal-close" onclick="closeDetail()" title="Cerrar">✕</button>

    <div class="modal-hero">
      <div class="modal-cover" id="modal-cover">
        <span class="no-image">🎮</span>
      </div>
      <div class="modal-info">
        <div class="modal-game-title" id="modal-title"></div>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="openEditMode()">✏️ Editar</button>
          <button class="btn-danger"    onclick="openDeleteConfirm()">🗑️ Eliminar</button>
        </div>
      </div>
    </div>

    <div class="modal-body">

      <!-- Vista Wikipedia (modo lectura) -->
      <div id="modal-wiki-section" class="wiki-section">
        <div class="wiki-label">📖 Wikipedia</div>
        <div id="modal-wiki"><div class="wiki-loading"><span class="spinner"></span>Buscando en Wikipedia…</div></div>
      </div>

      <!-- Formulario de edición -->
      <div id="modal-edit-section" class="edit-section" style="display:none">
        <div class="edit-section-title">✏️ Editar Videojuego</div>
        <div class="edit-grid">
          <label>Título *<input type="text"   id="edit-titulo"      /></label>
          <label>Plataforma<input type="text" id="edit-plataforma"  /></label>
          <label>Año<input type="number"      id="edit-anio" min="1970" max="2030" /></label>
          <label class="checkbox-label" style="align-self:flex-end; padding-bottom:0.5rem;">
            <input type="checkbox" id="edit-completado" /> Completado
          </label>
          <div class="edit-actions">
            <button class="btn-secondary"  onclick="cancelEdit()">Cancelar</button>
            <button class="btn-primary"    onclick="saveEdit()">Guardar cambios</button>
          </div>
        </div>
      </div>

      <!-- Confirmación de borrado -->
      <div id="modal-delete-section" class="delete-section" style="display:none">
        <div class="delete-warning">
          <strong>⚠️ ¿Eliminar este videojuego?</strong>
          Esta acción no se puede deshacer.
        </div>
        <div class="delete-confirm-actions">
          <button class="btn-secondary"     onclick="cancelDeleteConfirm()">Cancelar</button>
          <button class="btn-confirm-delete" onclick="confirmDelete()">Sí, eliminar</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8080/api/videojuego';
  let allGames    = [];
  let currentGame = null;

  /* ── Load & render ── */

  async function loadGames() {
    const container = document.getElementById('list-container');
    container.innerHTML = '<div class="loader"><span class="spinner"></span>Cargando…</div>';
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allGames = await res.json();
      applyFilters();
      renderStats(allGames);
    } catch (e) {
      container.innerHTML = `<div class="empty"><span class="emoji">⚠️</span>No se pudo conectar con la API.<br><small>${e.message}</small></div>`;
    }
  }

  function renderGames(games) {
    const container = document.getElementById('list-container');
    if (!games.length) {
      container.innerHTML = '<div class="empty"><span class="emoji">🕹️</span>No hay videojuegos registrados aún.<br>¡Agrega el primero!</div>';
      return;
    }
    container.innerHTML = `
      <table>
        <thead>
          <tr><th>#</th><th>Título</th><th>Plataforma</th><th>Año</th><th>Estado</th></tr>
        </thead>
        <tbody>
          ${games.map(g => `
            <tr onclick="openDetail(${g.id})">
              <td style="color:var(--text-muted);width:50px">${g.id}</td>
              <td class="game-title">${esc(g.titulo)}</td>
              <td>${esc(g.plataforma || '—')}</td>
              <td>${g.anioLanzamiento ?? '—'}</td>
              <td>${g.completado
                ? '<span class="badge done">✔ Completado</span>'
                : '<span class="badge pending">⏳ Pendiente</span>'}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function renderStats(games) {
    const done = games.filter(g => g.completado).length;
    document.getElementById('stat-total').textContent   = games.length;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-pending').textContent = games.length - done;
  }

  /* ── Búsqueda y ordenado ── */

  function applyFilters() {
    const q    = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
    const sort = document.getElementById('sort-select')?.value || 'titulo-asc';

    document.getElementById('search-clear')?.classList.toggle('visible', q.length > 0);

    let result = allGames.filter(g =>
      g.titulo.toLowerCase().includes(q) ||
      (g.plataforma || '').toLowerCase().includes(q)
    );

    result.sort((a, b) => {
      switch (sort) {
        case 'titulo-asc':  return a.titulo.localeCompare(b.titulo, 'es');
        case 'titulo-desc': return b.titulo.localeCompare(a.titulo, 'es');
        case 'anio-desc':   return (b.anioLanzamiento ?? 0)    - (a.anioLanzamiento ?? 0);
        case 'anio-asc':    return (a.anioLanzamiento ?? 9999) - (b.anioLanzamiento ?? 9999);
        case 'id-asc':      return a.id - b.id;
        default:            return 0;
      }
    });

    const countEl = document.getElementById('result-count');
    if (countEl) {
      countEl.textContent = q
        ? `${result.length} de ${allGames.length} juegos`
        : `${allGames.length} juegos`;
    }

    renderGames(result);
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    applyFilters();
  }

  /* ── Detail modal ── */

  function openDetail(id) {
    currentGame = allGames.find(g => g.id === id);
    if (!currentGame) return;

    document.getElementById('modal-title').textContent = currentGame.titulo;
    document.getElementById('modal-meta').innerHTML = `
      ${currentGame.plataforma ? `<span class="meta-chip">🕹️ <strong>${esc(currentGame.plataforma)}</strong></span>` : ''}
      ${currentGame.anioLanzamiento ? `<span class="meta-chip">📅 <strong>${currentGame.anioLanzamiento}</strong></span>` : ''}
      <span class="meta-chip">${currentGame.completado
        ? '✔ <strong style="color:#34d399">Completado</strong>'
        : '⏳ <strong style="color:#94a3b8">Pendiente</strong>'}</span>`;

    document.getElementById('modal-cover').innerHTML = '<span class="no-image">🎮</span>';
    document.getElementById('modal-wiki').innerHTML  = '<div class="wiki-loading"><span class="spinner"></span>Buscando en Wikipedia…</div>';

    showSection('wiki');
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    fetchWikipedia(currentGame.titulo);
  }

  function closeDetail() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    currentGame = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeDetail();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

  function showSection(name) {
    document.getElementById('modal-wiki-section').style.display   = name === 'wiki'   ? '' : 'none';
    document.getElementById('modal-edit-section').style.display   = name === 'edit'   ? '' : 'none';
    document.getElementById('modal-delete-section').style.display = name === 'delete' ? '' : 'none';
  }

  /* ── Editar ── */

  function openEditMode() {
    document.getElementById('edit-titulo').value       = currentGame.titulo;
    document.getElementById('edit-plataforma').value   = currentGame.plataforma || '';
    document.getElementById('edit-anio').value         = currentGame.anioLanzamiento || '';
    document.getElementById('edit-completado').checked = currentGame.completado;
    showSection('edit');
  }

  function cancelEdit() { showSection('wiki'); }

  async function saveEdit() {
    const titulo = document.getElementById('edit-titulo').value.trim();
    if (!titulo) { showToast('El título es obligatorio', 'error'); return; }

    const body = {
      titulo,
      plataforma:      document.getElementById('edit-plataforma').value.trim() || null,
      anioLanzamiento: parseInt(document.getElementById('edit-anio').value) || null,
      completado:      document.getElementById('edit-completado').checked,
    };

    try {
      const res = await fetch(`${API}/${currentGame.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast('Videojuego actualizado ✔', 'success');
      closeDetail();
      loadGames();
    } catch (e) {
      showToast('Error al actualizar: ' + e.message, 'error');
    }
  }

  /* ── Eliminar ── */

  function openDeleteConfirm() { showSection('delete'); }

  function cancelDeleteConfirm() { showSection('wiki'); }

  async function confirmDelete() {
    try {
      const res = await fetch(`${API}/${currentGame.id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast('Videojuego eliminado', 'success');
      closeDetail();
      loadGames();
    } catch (e) {
      showToast('Error al eliminar: ' + e.message, 'error');
    }
  }

  /* ── Wikipedia API ── */

  async function fetchWikipedia(titulo) {
    const wikiEl  = document.getElementById('modal-wiki');
    const coverEl = document.getElementById('modal-cover');

    try {
      // 1. Buscar el artículo más relevante
      const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search` +
        `&srsearch=${encodeURIComponent(titulo + ' video game')}&srlimit=1&format=json&origin=*`;
      const searchRes  = await fetch(searchUrl);
      const searchData = await searchRes.json();
      const results    = searchData?.query?.search;

      if (!results?.length) {
        wikiEl.innerHTML = '<p class="wiki-not-found">No se encontró información en Wikipedia.</p>';
        return;
      }

      const pageTitle = results[0].title;

      // 2. Obtener imagen e introducción de esa página
      const detailUrl = `https://en.wikipedia.org/w/api.php?action=query` +
        `&titles=${encodeURIComponent(pageTitle)}` +
        `&prop=pageimages|extracts` +
        `&pithumbsize=600&exintro=true&explaintext=true` +
        `&format=json&origin=*`;
      const detailRes  = await fetch(detailUrl);
      const detailData = await detailRes.json();
      const pages      = detailData?.query?.pages;
      const page       = pages ? Object.values(pages)[0] : null;

      if (!page) {
        wikiEl.innerHTML = '<p class="wiki-not-found">No se encontró información en Wikipedia.</p>';
        return;
      }

      // Imagen
      if (page.thumbnail?.source) {
        coverEl.innerHTML = `<img src="${page.thumbnail.source}" alt="${esc(titulo)}" loading="lazy" />`;
      }

      // Descripción (máx. 600 caracteres)
      const extract = page.extract?.trim() || '';
      const short   = extract.length > 600 ? extract.slice(0, 600).replace(/\s\S+$/, '') + '…' : extract;
      const wikiLink = `https://en.wikipedia.org/wiki/${encodeURIComponent(pageTitle)}`;

      wikiEl.innerHTML = short
        ? `<p class="wiki-text">${esc(short)}</p>
           <a class="wiki-link" href="${wikiLink}" target="_blank" rel="noopener">
             Ver artículo completo →
           </a>`
        : `<p class="wiki-not-found">Artículo encontrado pero sin descripción disponible.</p>
           <a class="wiki-link" href="${wikiLink}" target="_blank" rel="noopener">Ver en Wikipedia →</a>`;

    } catch (e) {
      wikiEl.innerHTML = `<p class="wiki-not-found">Error al consultar Wikipedia: ${esc(e.message)}</p>`;
    }
  }

  /* ── Form ── */

  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Guardando…';

    const body = {
      titulo:          document.getElementById('titulo').value.trim(),
      plataforma:      document.getElementById('plataforma').value.trim() || null,
      anioLanzamiento: parseInt(document.getElementById('anioLanzamiento').value) || null,
      completado:      document.getElementById('completado').checked,
    };

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast('Videojuego guardado ✔', 'success');
      resetForm();
      loadGames();
    } catch (e) {
      showToast('Error al guardar: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Guardar';
    }
  }

  function resetForm() { document.getElementById('form').reset(); }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 3000);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  loadGames();
</script>
</body>
</html>
