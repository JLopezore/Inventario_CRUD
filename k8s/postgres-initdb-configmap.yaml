apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: crudlab
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS videojuegos (
        id          BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        titulo      VARCHAR(255) NOT NULL,
        plataforma  VARCHAR(255),
        anio_lanzamiento INTEGER,
        completado  BOOLEAN NOT NULL DEFAULT FALSE
    );

    INSERT INTO videojuegos (titulo, plataforma, anio_lanzamiento, completado)
    SELECT titulo, plataforma, anio_lanzamiento, completado
    FROM (VALUES
        ('The Legend of Zelda: Breath of the Wild', 'Nintendo Switch', 2017, true),
        ('The Legend of Zelda: Tears of the Kingdom', 'Nintendo Switch', 2023, false),
        ('Elden Ring', 'PC', 2022, false),
        ('The Witcher 3: Wild Hunt', 'PS4', 2015, true),
        ('God of War Ragnarök', 'PS5', 2022, true),
        ('Baldur''s Gate 3', 'PC', 2023, false),
        ('Red Dead Redemption 2', 'PS4', 2018, false),
        ('Cyberpunk 2077', 'PC', 2020, true),
        ('Persona 5 Royal', 'PS4', 2019, false),
        ('Mass Effect Legendary Edition', 'PC', 2021, true),
        ('Horizon Zero Dawn', 'PS4', 2017, true),
        ('Final Fantasy VII Remake', 'PS4', 2020, false),
        ('Hollow Knight', 'PC', 2017, true),
        ('Super Mario Odyssey', 'Nintendo Switch', 2017, true),
        ('Super Mario Bros. Wonder', 'Nintendo Switch', 2023, false),
        ('Metroid Dread', 'Nintendo Switch', 2021, true),
        ('Celeste', 'PC', 2018, true),
        ('Ori and the Will of the Wisps', 'Xbox One', 2020, true),
        ('Dead Cells', 'PC', 2018, false),
        ('Cuphead', 'PC', 2017, true),
        ('DOOM Eternal', 'PC', 2020, true),
        ('Halo Infinite', 'Xbox Series X', 2021, false),
        ('Returnal', 'PS5', 2021, false),
        ('Overwatch 2', 'PC', 2022, true),
        ('Call of Duty: Modern Warfare II', 'PS5', 2022, false),
        ('Destiny 2', 'PC', 2017, true),
        ('Hades', 'Nintendo Switch', 2020, true),
        ('Stardew Valley', 'PC', 2016, true),
        ('Vampire Survivors', 'PC', 2022, true),
        ('Undertale', 'PC', 2015, true),
        ('Disco Elysium', 'PC', 2019, false),
        ('Slay the Spire', 'PC', 2019, true),
        ('Bloodborne', 'PS4', 2015, true),
        ('Sekiro: Shadows Die Twice', 'PC', 2019, false),
        ('NieR: Automata', 'PS4', 2017, true),
        ('Dark Souls III', 'PC', 2016, true),
        ('BioShock Infinite', 'PC', 2013, true),
        ('Forza Horizon 5', 'Xbox Series X', 2021, true),
        ('Mario Kart 8 Deluxe', 'Nintendo Switch', 2017, true),
        ('Gran Turismo 7', 'PS5', 2022, false),
        ('Rocket League', 'PC', 2015, true),
        ('FIFA 23', 'PS5', 2022, false),
        ('Civilization VI', 'PC', 2016, false),
        ('Age of Empires II: Definitive Edition', 'PC', 2019, true),
        ('The Sims 4', 'PC', 2014, true),
        ('Cities: Skylines', 'PC', 2015, false),
        ('Super Mario 64', 'Nintendo 64', 1996, true),
        ('The Legend of Zelda: Ocarina of Time', 'Nintendo 64', 1998, true),
        ('Castlevania: Symphony of the Night', 'PlayStation', 1997, true),
        ('Chrono Trigger', 'SNES', 1995, true)
    ) AS v(titulo, plataforma, anio_lanzamiento, completado)
    WHERE NOT EXISTS (SELECT 1 FROM videojuegos);
