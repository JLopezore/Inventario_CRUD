version: '3.8'
services:

  postgres-db:
    image: docker.io/postgres:16-alpine
    container_name: inventario_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: inventario
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inventario"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: crudlab_app
    expose:
      - "8080"
    environment:
      DB_URL: jdbc:postgresql://postgres-db:5432/inventario
      DB_USER: admin
      DB_PASSWORD: 123456
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: on-failure

  nginx:
    image: docker.io/nginx:alpine
    container_name: crudlab_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src/main/resources/static:/usr/share/nginx/html:ro,Z
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    depends_on:
      - app
    restart: on-failure

volumes:
  postgres_data:
